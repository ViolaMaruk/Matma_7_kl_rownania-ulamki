<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rozwiąż Równania (Реши уравнения)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('background2.jpg');
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .header-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        h1 {
            text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db;
            padding-bottom: 10px; margin-top: 0; margin-bottom: 15px;
        }
        .description { text-align: center; font-size: 1.1em; color: #555; margin: 0; }
        
        .task-card {
            background: #fff; padding: 20px 25px; margin-bottom: 20px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 6px solid #3498db; transition: all 0.3s;
        }
        .task-card.correct-bg { background-color: #d4edda; border-left-color: #28a745; }
        .task-card.incorrect-bg { background-color: #f8d7da; border-left-color: #dc3545; }
        .task-text { font-size: 1.2em; margin-bottom: 15px; }
        
        /* СТИЛИ ДЛЯ КРАСИВЫХ УРАВНЕНИЙ И ДРОБЕЙ */
        .equation { 
            font-family: 'Georgia', 'Times New Roman', serif; 
            font-size: 1.3em; 
            background: #f8f9fa; 
            padding: 8px 15px; 
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }
        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 4px;
            line-height: 1.1;
            font-size: 0.9em;
        }
        .frac .num {
            border-bottom: 1.5px solid #333;
            padding: 0 3px;
        }
        .frac .den {
            padding: 2px 3px 0 3px;
        }

        .input-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px;}
        input[type="text"] {
            padding: 10px; font-size: 1em; border: 2px solid #e2e8f0;
            border-radius: 6px; flex-grow: 1; max-width: 300px; outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        
        button {
            background-color: #3498db; color: white; border: none; padding: 10px 20px;
            font-size: 1em; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-hint { background-color: #f39c12; }
        button.btn-hint:hover { background-color: #d68910; }
        button.btn-answer { background-color: #9b59b6; }
        button.btn-answer:hover { background-color: #8e44ad; }
        
        .feedback { font-weight: bold; margin-left: 10px; }
        .correct { color: #1e8449; }
        .incorrect { color: #c0392b; }
        .hint-text { display: none; margin-top: 15px; padding: 12px; background-color: #fff3cd; border-left: 4px solid #ffc107; font-style: italic; color: #856404; border-radius: 0 6px 6px 0; }

        #start-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 12px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content input {
            width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; text-align: center;
            font-size: 1.1em; border: 2px solid #e2e8f0; border-radius: 6px;
        }
        .modal-content button { width: 100%; font-size: 1.1em; padding: 12px; background-color: #27ae60;}
        .modal-content button:hover { background-color: #2ecc71;}
        
        #app-content { display: none; }
        
        .finish-container {
            text-align: center; background: rgba(255,255,255,0.95); padding: 30px;
            border-radius: 12px; margin-top: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .btn-finish { background-color: #e74c3c; font-size: 1.2em; padding: 15px 30px; }
        .btn-finish:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div id="start-modal">
        <div class="modal-content">
            <h2>Witaj! 👋</h2>
            <p>Przed rozpoczęciem testu wpisz swoje dane:</p>
            <input type="text" id="student-name" placeholder="Imię i nazwisko" required>
            <input type="text" id="student-class" placeholder="Klasa (np. 6A)" required>
            <button onclick="startTest()">Rozpocznij test</button>
            <p id="modal-error" style="color: red; font-size: 0.9em; display: none;">Proszę wypełnić wszystkie pola!</p>
        </div>
    </div>

    <div id="app-content">
        <div class="header-container">
            <h1>Rozwiąż równania / Реши уравнения</h1>
            <p class="description">Rozwiąż poniższe równania. Jako odpowiedź wpisz samą liczbę będącą rozwiązaniem (np. <b>3</b>) lub w formie <b>x=3</b>.</p>
        </div>

        <div id="tasks-container"></div>

        <div class="finish-container">
            <h2 id="finish-text">Skończyłeś? Wyślij wyniki do nauczyciela!</h2>
            <button class="btn-finish" id="btn-submit" onclick="sendResults()">Wyślij wyniki 📧</button>
        </div>
    </div>

    <script>
        let currentStudent = "";
        let currentClass = "";
        let resultsData = {}; 
        let userAttempts = {};

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            const classInput = document.getElementById("student-class").value.trim();
            
            if(nameInput === "" || classInput === "") {
                document.getElementById("modal-error").style.display = "block";
                return;
            }
            
            currentStudent = nameInput;
            currentClass = classInput;
            
            document.getElementById("start-modal").style.display = "none";
            document.getElementById("app-content").style.display = "block";
        }

        // БАЗА ЗАДАНИЙ С КРАСИВЫМИ ДРОБЯМИ (HTML-структура дробей)
        const tasksData = [
            { text: "Rozwiąż równanie: <br><br><span class='equation'>-(3x - 2) = -7</span>", hint: "Najpierw opuść nawias, zmieniając znaki (bo przed nawiasem jest minus).", answers: ["3", "x=3"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'>3(x - 2) = x</span>", hint: "Pomnóż liczbę 3 przez każdy wyraz w nawiasie.", answers: ["3", "x=3"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'>-(x + 4) = 2x - 1</span>", hint: "Opuść nawias (zmieniając znaki), a następnie przenieś niewiadome (x) na jedną stronę równania.", answers: ["-1", "x=-1"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>x</span><span class='den'>2</span></span> + 1 = <span class='frac'><span class='num'>3</span><span class='den'>2</span></span> + <span class='frac'><span class='num'>x</span><span class='den'>4</span></span></span>", hint: "Pomnóż całe równanie przez wspólny mianownik, czyli 4, aby pozbyć się ułamków.", answers: ["2", "x=2"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>3x - 1</span><span class='den'>2</span></span> = <span class='frac'><span class='num'>1</span><span class='den'>2</span></span> + x</span>", hint: "Pomnóż obie strony przez 2, aby zlikwidować ułamki.", answers: ["2", "x=2"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>x + 3</span><span class='den'>4</span></span> + <span class='frac'><span class='num'>x - 2</span><span class='den'>3</span></span> = 3</span>", hint: "Wspólnym mianownikiem dla 4 i 3 jest 12. Pomnóż obie strony przez 12.", answers: ["5", "x=5"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>3x + 4</span><span class='den'>5</span></span> = <span class='frac'><span class='num'>2 - x</span><span class='den'>4</span></span> + x</span>", hint: "Wspólnym mianownikiem jest 20. Pomnóż całe równanie przez 20.", answers: ["2", "x=2"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>3x - 1</span><span class='den'>2</span></span> - <span class='frac'><span class='num'>5x + 1</span><span class='den'>4</span></span> = 0</span>", hint: "Pomnóż przez 4. Pamiętaj o zmianie znaku w liczniku drugiego ułamka, bo przed nim stoi minus!", answers: ["3", "x=3"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>x</span><span class='den'>2</span></span> = <span class='frac'><span class='num'>3</span><span class='den'>5</span></span>(9 - x) - 1</span>", hint: "Pomnóż obustronnie przez 10, aby pozbyć się ułamków (2 i 5 w mianowniku).", answers: ["4", "x=4"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'><span class='frac'><span class='num'>3x - 1</span><span class='den'>5</span></span> - <span class='frac'><span class='num'>x - 2</span><span class='den'>3</span></span> = 0,5x</span>", hint: "Pomnóż przez 15. Zauważ, że z prawej strony: 0,5x * 15 = 7,5x.", answers: ["2", "x=2"] },
            
            { text: "Rozwiąż równanie: <br><br><span class='equation'>x - <span class='frac'><span class='num'>3x - 2</span><span class='den'>4</span></span> = -<span class='frac'><span class='num'>1</span><span class='den'>2</span></span>x + 2</span>", hint: "Pomnóż całe równanie obustronnie przez 4. Uważaj na minus przed ułamkiem!", answers: ["2", "x=2"] }
        ];

        const container = document.getElementById("tasks-container");

        tasksData.forEach((task, index) => {
            const taskNum = index + 1;
            resultsData[taskNum] = "Nie rozwiązano"; 

            const answersJson = JSON.stringify(task.answers).replace(/"/g, "'");
            const firstAnswer = task.answers[0];

            container.innerHTML += `
                <div class="task-card" id="card${taskNum}">
                    <div class="task-text"><strong>${taskNum}.</strong> ${task.text}</div>
                    <div class="input-group">
                        <input type="text" id="input${taskNum}" placeholder="Wynik x = ...">
                        <button onclick="checkAnswer(${taskNum}, 'input${taskNum}', 'card${taskNum}', 'feedback${taskNum}', ${answersJson}, 'btn-answer${taskNum}')">Sprawdź</button>
                        <button class="btn-hint" onclick="document.getElementById('hint${taskNum}').style.display='block'">Podpowiedź</button>
                        
                        <button class="btn-answer" id="btn-answer${taskNum}" style="display: none;" onclick="showAnswer(${taskNum}, 'input${taskNum}', '${firstAnswer}', 'card${taskNum}', 'feedback${taskNum}', 'btn-answer${taskNum}')">Odpowiedź</button>
                        
                        <span id="feedback${taskNum}" class="feedback"></span>
                    </div>
                    <div id="hint${taskNum}" class="hint-text">${task.hint}</div>
                </div>
            `;
        });

        function checkAnswer(taskNum, inputId, cardId, feedbackId, correctAnswers, btnAnswerId) {
            let userInput = document.getElementById(inputId).value;
            let feedbackEl = document.getElementById(feedbackId);
            let cardEl = document.getElementById(cardId);
            let btnAnswer = document.getElementById(btnAnswerId);
            
            cardEl.classList.remove("correct-bg", "incorrect-bg");

            let normalized = userInput.replace(/\s+/g, '').toLowerCase().replace(',', '.');
            if (normalized === "") return (feedbackEl.textContent = "Wpisz odpowiedź!", feedbackEl.className = "feedback incorrect");

            if (userAttempts[inputId] === undefined) userAttempts[inputId] = new Set();

            let isCorrect = correctAnswers.some(ans => ans.toLowerCase() === normalized || ans.toLowerCase().replace('.', ',') === normalized.replace('.', ','));

            if (isCorrect) {
                feedbackEl.textContent = "Dobrze!"; 
                feedbackEl.className = "feedback correct"; 
                cardEl.classList.add("correct-bg");
                btnAnswer.style.display = "none";
                
                if(resultsData[taskNum] !== "Podglądał odpowiedź") {
                    resultsData[taskNum] = "Samodzielnie";
                }
            } else {
                if (userAttempts[inputId].has(userInput)) {
                    feedbackEl.textContent = "Już podałeś taką odpowiedź. Spróbuj inną!";
                } else {
                    userAttempts[inputId].add(userInput); 
                    feedbackEl.textContent = "Spróbuj jeszcze raz.";
                }
                feedbackEl.className = "feedback incorrect"; 
                cardEl.classList.add("incorrect-bg");
                
                if (userAttempts[inputId].size >= 2) {
                    btnAnswer.style.display = "inline-block";
                }
            }
        }

        function showAnswer(taskNum, inputId, correctAnswer, cardId, feedbackId, btnAnswerId) {
            document.getElementById(inputId).value = correctAnswer;
            document.getElementById(cardId).classList.remove("incorrect-bg");
            document.getElementById(cardId).classList.add("correct-bg");
            document.getElementById(feedbackId).innerHTML = "Oto prawidłowa odpowiedź!";
            document.getElementById(feedbackId).className = "feedback correct";
            document.getElementById(btnAnswerId).style.display = "none";
            
            resultsData[taskNum] = "Podglądał odpowiedź";
        }

        function sendResults() {
            let correctCount = 0; let hintCount = 0; let notSolvedCount = 0;
            let detailedReport = "";
            let totalTasks = tasksData.length;

            for(let i = 1; i <= totalTasks; i++) {
                let inputId = 'input' + i;
                let currentInputVal = document.getElementById(inputId).value.trim();
                let attemptsSet = userAttempts[inputId];
                let wrongAttemptsString = (attemptsSet && attemptsSet.size > 0) ? Array.from(attemptsSet).join(", ") : "";

                if(resultsData[i] === "Samodzielnie") {
                    correctCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Błędy przed sukcesem: ${wrongAttemptsString} | Odpowiedź końcowa: ${currentInputVal})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Odpowiedź: ${currentInputVal})\n`;
                    }
                }
                else if(resultsData[i] === "Podglądał odpowiedź") {
                    hintCount++;
                    detailedReport += `Zadanie ${i}: Podglądał odpowiedź (Błędne próby ucznia: ${wrongAttemptsString || "brak, od razu nacisnął podpowiedź"})\n`;
                }
                else {
                    notSolvedCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Błędne próby: ${wrongAttemptsString})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Pole puste)\n`;
                    }
                }
            }

            const finalMessage = `Uczeń: ${currentStudent}\nKlasa: ${currentClass}\n\nWYNIK GŁÓWNY:\n- Rozwiązane samodzielnie: ${correctCount} z ${totalTasks}\n- Z użyciem gotowej odpowiedzi: ${hintCount} z ${totalTasks}\n- Brak odpowiedzi: ${notSolvedCount} z ${totalTasks}\n\nSZCZEGÓŁY:\n${detailedReport}`;

            const btnSubmit = document.getElementById("btn-submit");
            btnSubmit.textContent = "Wysyłanie...";
            btnSubmit.style.backgroundColor = "#7f8c8d";
            btnSubmit.disabled = true;

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    access_key: "99356b6c-ab77-4ea0-a3cb-99560d40fafa", // Twój unikalny klucz Web3Forms
                    subject: `Wyniki równań: ${currentStudent} (${currentClass})`,
                    from_name: "Test Matematyczny",
                    message: finalMessage
                })
            })
            .then(async (response) => {
                if (response.status == 200) {
                    document.getElementById("finish-text").innerText = "Udało się! Wyniki zostały wysłane do nauczyciela. Możesz zamknąć stronę.";
                    btnSubmit.style.display = "none";
                } else {
                    document.getElementById("finish-text").innerText = "Błąd wysyłania. Zgłoś to nauczycielowi.";
                    btnSubmit.textContent = "Spróbuj ponownie";
                    btnSubmit.disabled = false;
                    btnSubmit.style.backgroundColor = "#e74c3c";
                }
            })
            .catch(error => {
                console.log(error);
                document.getElementById("finish-text").innerText = "Błąd połączenia. Sprawdź internet i spróbuj ponownie.";
                btnSubmit.textContent = "Wyślij";
                btnSubmit.disabled = false;
                btnSubmit.style.backgroundColor = "#e74c3c";
            });
        }
    </script>
</body>
</html>
